kind = "web"
previewPath = "/"
title = "Capybara Simulator 3D"
version = "1.0.0"
id = "artifacts/capybara-simulator"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25283

[services.development]
run = "pnpm --filter @workspace/capybara-simulator run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/capybara-simulator", "run", "build" ]
publicDir = "artifacts/capybara-simulator/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25283"
BASE_PATH = "/"
